<div class="flex h-screen bg-gray-50 font-sans overflow-hidden">
  
  <!-- ===== SIDEBAR DESKTOP ===== -->
  <aside 
    class="hidden md:flex bg-[#1e293b] text-white flex-col transition-all duration-300 ease-in-out z-20 shadow-2xl relative"
    [class.w-64]="isSidebarOpen"
    [class.w-20]="!isSidebarOpen">
    
    <!-- Logo area -->
    <div class="h-20 flex items-center px-6 border-b border-white/5 overflow-hidden shrink-0">
      <div class="flex items-center gap-3 min-w-[200px]">
        <img src="assets/logo.png" alt="Logo" class="h-10 w-auto shrink-0">
        <span class="text-xl font-black tracking-tight whitespace-nowrap transition-opacity duration-300" [class.opacity-0]="!isSidebarOpen">
          Admin<span class="text-blue-500">Panel</span>
        </span>
      </div>
    </div>

    <!-- Navigation Links -->
    <nav class="flex-1 overflow-y-auto py-6 px-3 space-y-2 no-scrollbar">
      
      <!-- Dashboard -->
      <a routerLink="/admin/monitor" routerLinkActive="bg-blue-600 text-white" 
         class="flex items-center gap-4 px-4 py-3.5 rounded-2xl text-slate-400 hover:text-white hover:bg-white/5 transition-all group relative">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" class="shrink-0"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <span class="font-bold text-sm whitespace-nowrap transition-all duration-300" [class.opacity-0]="!isSidebarOpen" [class.translate-x-4]="!isSidebarOpen">Dashboard</span>
        <div *ngIf="!isSidebarOpen" class="absolute left-full ml-4 px-3 py-2 bg-slate-900 text-white text-[10px] font-black uppercase tracking-widest rounded-lg opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all whitespace-nowrap z-50 shadow-xl border border-white/10">
          Dashboard
        </div>
      </a>

      <!-- Validación Pagos -->
      <a routerLink="/admin/pagos" routerLinkActive="bg-blue-600 text-white" 
         class="flex items-center gap-4 px-4 py-3.5 rounded-2xl text-slate-400 hover:text-white hover:bg-white/5 transition-all group relative">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" class="shrink-0"><rect width="20" height="14" x="2" y="5" rx="2"/><line x1="2" x2="22" y1="10" y2="10"/></svg>
        <span class="font-bold text-sm whitespace-nowrap transition-all duration-300" [class.opacity-0]="!isSidebarOpen" [class.translate-x-4]="!isSidebarOpen">Validación Pagos</span>
        <div *ngIf="!isSidebarOpen" class="absolute left-full ml-4 px-3 py-2 bg-slate-900 text-white text-[10px] font-black uppercase tracking-widest rounded-lg opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all whitespace-nowrap z-50 shadow-xl border border-white/10">
          Pagos
        </div>
      </a>

      <!-- Mensajería -->
      <a routerLink="/admin/mensajeria" routerLinkActive="bg-blue-600 text-white" 
         class="flex items-center gap-4 px-4 py-3.5 rounded-2xl text-slate-400 hover:text-white hover:bg-white/5 transition-all group relative">
        <div class="relative shrink-0">
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          <span *ngIf="notificacionesNuevas > 0" class="absolute -top-2 -right-2 bg-red-500 text-white text-[10px] font-black w-5 h-5 flex items-center justify-center rounded-full border-2 border-[#1e293b]">
            {{ notificacionesNuevas }}
          </span>
        </div>
        <span class="font-bold text-sm whitespace-nowrap transition-all duration-300" [class.opacity-0]="!isSidebarOpen" [class.translate-x-4]="!isSidebarOpen">Mensajería</span>
        <div *ngIf="!isSidebarOpen" class="absolute left-full ml-4 px-3 py-2 bg-slate-900 text-white text-[10px] font-black uppercase tracking-widest rounded-lg opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all whitespace-nowrap z-50 shadow-xl border border-white/10">
          Mensajería
        </div>
      </a>

      <!-- Usuarios (Gestión) -->
      <a routerLink="/admin/usuarios" routerLinkActive="bg-blue-600 text-white" 
         class="flex items-center gap-4 px-4 py-3.5 rounded-2xl text-slate-400 hover:text-white hover:bg-white/5 transition-all group relative">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" class="shrink-0"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        <span class="font-bold text-sm whitespace-nowrap transition-all duration-300" [class.opacity-0]="!isSidebarOpen" [class.translate-x-4]="!isSidebarOpen">Usuarios</span>
        <div *ngIf="!isSidebarOpen" class="absolute left-full ml-4 px-3 py-2 bg-slate-900 text-white text-[10px] font-black uppercase tracking-widest rounded-lg opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all whitespace-nowrap z-50 shadow-xl border border-white/10">
          Usuarios
        </div>
      </a>

      <!-- Configuración -->
      <a routerLink="/admin/perfil" routerLinkActive="bg-blue-600 text-white" 
         class="flex items-center gap-4 px-4 py-3.5 rounded-2xl text-slate-400 hover:text-white hover:bg-white/5 transition-all group relative">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" class="shrink-0"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.1a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
        <span class="font-bold text-sm whitespace-nowrap transition-all duration-300" [class.opacity-0]="!isSidebarOpen" [class.translate-x-4]="!isSidebarOpen">Configuración</span>
        <div *ngIf="!isSidebarOpen" class="absolute left-full ml-4 px-3 py-2 bg-slate-900 text-white text-[10px] font-black uppercase tracking-widest rounded-lg opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all whitespace-nowrap z-50 shadow-xl border border-white/10">
          Configuración
        </div>
      </a>

    </nav>

    <!-- Sidebar Footer Toggle -->
    <div class="p-4 border-t border-white/5">
      <button (click)="toggleSidebar()" class="w-full flex items-center justify-center p-3 rounded-xl bg-white/5 hover:bg-white/10 transition-colors">
        <svg [class.rotate-180]="!isSidebarOpen" class="transition-transform duration-500 text-slate-400" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m15 18-6-6 6-6"/></svg>
      </button>
    </div>
  </aside>

  <!-- ===== MOBILE TAB BAR ===== -->
  <nav class="fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-xl border-t border-gray-100 flex md:hidden justify-around items-center z-[100] h-20 shadow-[0_-8px_30px_rgba(0,0,0,0.08)] px-2 rounded-t-[2rem]">
    <a routerLink="/admin/monitor" routerLinkActive="text-blue-600 bg-blue-50" class="flex flex-col items-center gap-1 p-3 rounded-2xl transition-all">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span class="text-[9px] font-black uppercase tracking-tighter">Panel</span>
    </a>
    <a routerLink="/admin/pagos" routerLinkActive="text-blue-600 bg-blue-50" class="flex flex-col items-center gap-1 p-3 rounded-2xl transition-all">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect width="20" height="14" x="2" y="5" rx="2"/><line x1="2" x2="22" y1="10" y2="10"/></svg>
      <span class="text-[9px] font-black uppercase tracking-tighter">Pagos</span>
    </a>
    <a routerLink="/admin/mensajeria" routerLinkActive="text-blue-600 bg-blue-50" class="flex flex-col items-center gap-1 p-3 rounded-2xl transition-all relative">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      <span *ngIf="notificacionesNuevas > 0" class="absolute top-2 right-2 bg-red-500 text-white text-[8px] font-black w-4 h-4 flex items-center justify-center rounded-full border border-white">{{ notificacionesNuevas }}</span>
      <span class="text-[9px] font-black uppercase tracking-tighter">Chat</span>
    </a>
    <a routerLink="/admin/usuarios" routerLinkActive="text-blue-600 bg-blue-50" class="flex flex-col items-center gap-1 p-3 rounded-2xl transition-all">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
      <span class="text-[9px] font-black uppercase tracking-tighter">Users</span>
    </a>
  </nav>

  <!-- ===== CONTENT AREA ===== -->
  <div class="flex-1 flex flex-col min-w-0">
    
    <!-- Top Header -->
    <header class="bg-transparent flex items-center justify-between pt-4 pb-2 px-6 z-10 shrink-0">
      <div class="flex items-center gap-4">
        <h2 class="text-xl font-black text-slate-900 tracking-tight hidden sm:block">Admin<span class="text-blue-600">Console</span></h2>
        <div class="h-6 w-px bg-slate-200 hidden sm:block"></div>
        <p class="text-xs font-bold text-slate-400 uppercase tracking-widest hidden lg:block">Panel de Control Ecuavip</p>
      </div>

      <div class="flex items-center gap-6">
        <!-- Profile Dropdown -->
        <div class="relative group">
          <button class="flex items-center gap-3 p-1.5 pr-4 rounded-2xl hover:bg-slate-50 transition-all border border-transparent hover:border-slate-200">
            <div class="w-10 h-10 rounded-xl bg-blue-600 text-white flex items-center justify-center font-black shadow-lg shadow-blue-600/20">
              {{ usuario?.nombre?.charAt(0) }}
            </div>
            <div class="text-left hidden lg:block">
              <p class="text-sm font-semibold text-slate-800 leading-tight">{{ usuario?.nombre?.split(' ')[0] }}</p>
              <p class="text-[10px] font-semibold text-slate-500 uppercase tracking-widest">Administrador</p>
            </div>
            <svg class="text-slate-600" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="m6 9 6 6 6-6"/></svg>
          </button>

          <!-- Dropdown menu -->
          <div class="absolute right-0 top-full mt-2 w-56 opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-200 z-50">
            <div class="bg-white rounded-2xl shadow-2xl border border-slate-100 p-2">
              <div class="px-4 py-3 border-b border-slate-50 mb-1">
                <p class="text-sm font-black text-slate-900">{{ usuario?.nombre }}</p>
                <p class="text-[10px] text-slate-400 font-bold truncate">{{ usuario?.correo }}</p>
              </div>
              <a routerLink="/cliente/perfil" class="flex items-center gap-3 px-4 py-3 text-xs font-bold text-slate-600 hover:bg-slate-50 rounded-xl transition-all">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                Mi Perfil
              </a>
              <div class="border-t border-slate-50 mt-1 pt-1">
                <button (click)="logout()" class="w-full flex items-center gap-3 px-4 py-3 text-xs font-bold text-red-500 hover:bg-red-50 rounded-xl transition-all">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                  Cerrar Sesión
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 overflow-y-auto p-4 md:p-8 pb-28 md:pb-8 no-scrollbar bg-slate-50/50">
      <router-outlet></router-outlet>
    </main>
  </div>

</div>

<style>
  .no-scrollbar::-webkit-scrollbar { display: none; }
  .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
</style>
