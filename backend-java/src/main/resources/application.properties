# ===================================================================
# Core Application Configuration
# ===================================================================

# Servidor HTTP
server.address=0.0.0.0
server.port=${PORT:5001}
server.forward-headers-strategy=framework

# Perfil activo
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# PostgreSQL / Supabase
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# Logging SQL
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
logging.level.org.hibernate.orm.jdbc.bind=${HIBERNATE_BIND_LOG_LEVEL:INFO}

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

app.frontend-url=${FRONTEND_URL:http://localhost:4200}

# CORS
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:4200,http://localhost:3000,http://localhost:5173}

# Subida de archivos
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Socket.IO
app.socket.host=${SOCKET_HOST:0.0.0.0}
app.socket.port=${SOCKET_PORT:5002}

# Cloudflare R2
r2.account-id=${R2_ACCOUNT_ID:}
r2.access-key-id=${R2_ACCESS_KEY_ID:}
r2.secret-access-key=${R2_SECRET_ACCESS_KEY:}
r2.bucket=${R2_BUCKET:}
r2.endpoint=${R2_ENDPOINT:https://r2.cloudflarestorage.com}
r2.public-url=${R2_PUBLIC_URL:}
