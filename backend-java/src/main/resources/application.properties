# ===================================================================
# Core Application Configuration
# ===================================================================

# Servidor HTTP
server.address=0.0.0.0
server.port=${PORT:5001}

# Perfil activo
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# PostgreSQL / Supabase
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/ecuaviptour}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:none}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# Logging SQL
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.orm.jdbc.bind=${HIBERNATE_BIND_LOG_LEVEL:INFO}

# JWT
jwt.secret=${JWT_SECRET:default_ecuavip_jwt_signing_key_32_chars_long_placeholder}

# CORS
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:4200,http://localhost:3000,http://localhost:5173}

# Subida de archivos
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Socket.IO
app.socket.host=${SOCKET_HOST:0.0.0.0}
